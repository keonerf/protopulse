<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Explore Baker-01 — ProtoPulse</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="./support.js"></script>
<script>
/* Slide-driven interactive tour of the build film.
   Each 100vh slide maps to a scene segment [t0, t1]. Scrolling snaps between
   slides; on arrival the segment plays through once (timed seek loop — a seek
   pauses the Stage's own autoplay, so we are the player). The cursor tilts the
   whole model in 3D. Lives in <head> so the x-dc body re-render can't strip it. */
(function () {
  var SLIDES = [
    { t0: 0.6,  t1: 7.4  },   /* assembled hero + dimensions   */
    { t0: 8.6,  t1: 14.4 },   /* insert board · close · start  */
    { t0: 15.2, t1: 21.3 },   /* 01 scan                        */
    { t0: 21.7, t1: 27.8 },   /* 02 mill                        */
    { t0: 28.2, t1: 34.3 },   /* 03 clean                       */
    { t0: 34.7, t1: 40.8 },   /* 04 mask                        */
    { t0: 41.2, t1: 47.3 },   /* 05 cure                        */
    { t0: 47.7, t1: 53.8 },   /* 06 stencil                     */
    { t0: 54.2, t1: 60.3 },   /* 07 paste                       */
    { t0: 60.7, t1: 66.8 },   /* 08 place                       */
    { t0: 67.2, t1: 73.3 },   /* 09 reflow                      */
    { t0: 74.0, t1: 81.2 },   /* exploded — modular             */
    { t0: 82.0, t1: 89.3 }    /* outro spec sheet               */
  ];
  window.__PP_SLIDE_COUNT = SLIDES.length;
  var reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function filmSvg() { return document.querySelector('svg[data-om-exportable-video-with-duration-secs]'); }
  function seek(t) {
    var svg = filmSvg();
    if (svg) svg.dispatchEvent(new CustomEvent('data-om-seek-to-time-frame', { detail: { time: t } }));
  }

  /* segment player */
  var raf = null;
  function playSegment(s) {
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    seek(s.t0);
    if (reduced) { seek(s.t1 - 0.2); return; }
    var start = performance.now();
    function step(now) {
      var t = s.t0 + (now - start) / 1000;
      if (t >= s.t1) { seek(s.t1); raf = null; return; }
      seek(t);
      raf = requestAnimationFrame(step);
    }
    raf = requestAnimationFrame(step);
  }

  /* slide switching */
  var active = -1;
  function onScroll() {
    if (!filmSvg()) return;
    var idx = Math.max(0, Math.min(SLIDES.length - 1, Math.round(window.scrollY / window.innerHeight)));
    if (idx !== active) {
      active = idx;
      playSegment(SLIDES[idx]);
      var hint = document.getElementById('pp-hint');
      if (hint) hint.style.opacity = idx > 0 ? '0' : '1';
      var bar = document.getElementById('pp-progress');
      if (bar) bar.style.width = ((idx / (SLIDES.length - 1)) * 100).toFixed(1) + '%';
    }
  }
  window.addEventListener('scroll', onScroll, { passive: true });

  /* once the film mounts: hide its playback bar, park on slide 0 */
  var tries = 0;
  (function init() {
    var svg = filmSvg();
    if (!svg) { if (tries++ < 240) setTimeout(init, 60); return; }
    var p = svg;
    while (p.parentElement && !p.parentElement.hasAttribute('data-pp-film')) {
      var par = p.parentElement;
      for (var i = 0; i < par.children.length; i++) {
        var c = par.children[i];
        if (!c.contains(svg) && c.querySelector('button')) c.style.display = 'none';
      }
      p = par;
    }
    active = -1;
    onScroll();
    if (active === -1) playSegment(SLIDES[0]);
  })();
})();
</script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    html { scroll-snap-type: y mandatory; }
    html, body { margin: 0; padding: 0; background: #000; }
    .pp-slide { height: 100vh; scroll-snap-align: start; scroll-snap-stop: always; pointer-events: none; }
    #pp-hint {
      position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); z-index: 60;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; color: rgba(239,236,229,0.65); pointer-events: none;
      transition: opacity .5s ease; white-space: nowrap;
    }
    #pp-progress {
      position: fixed; left: 0; top: 0; height: 3px; width: 0%; z-index: 60;
      background: #CF8F4E; pointer-events: none; transition: width .4s ease;
    }
  </style>
</helmet>
<x-import component-from-global-scope="ProtopulseFilm" from="./animations.jsx ./protopulse-film.jsx?v=4" accent="{{ accent }}" captions="{{ captions }}" hint-size="100%,100vh"></x-import>
</x-dc>
<div class="pp-slide"></div><div class="pp-slide"></div><div class="pp-slide"></div>
<div class="pp-slide"></div><div class="pp-slide"></div><div class="pp-slide"></div>
<div class="pp-slide"></div><div class="pp-slide"></div><div class="pp-slide"></div>
<div class="pp-slide"></div><div class="pp-slide"></div><div class="pp-slide"></div>
<div class="pp-slide"></div>
<div id="pp-progress"></div>
<div id="pp-hint">Scroll to step through the build ↓</div>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;100vh&quot; },
  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#CF8F4E&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#CF8F4E&quot;, &quot;#7FA6FF&quot;, &quot;#9BD4A0&quot;], &quot;section&quot;: &quot;Look&quot; },
  &quot;captions&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Look&quot; }
}"></script>
</body>
</html>
